<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Savollar Test Tizimi (DB bilan)</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --secondary: #64748b;
      --danger: #ef4444;
      --success: #22c55e;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    * { box-sizing: border-box; outline: none; }
    body { font-family: 'Segoe UI', sans-serif; margin:0; background:var(--bg); color:var(--text-main); line-height:1.6; }

    header { background:var(--card-bg); border-bottom:1px solid var(--border); padding:1rem 0; position:sticky; top:0; z-index:100; }
    .container { width: 90%; max-width: 1200px; margin: 0 auto; }
    .header-content { display:flex; justify-content:space-between; align-items:center; }
    h1 { margin:0; font-size:1.5rem; color:var(--primary); display:flex; align-items:center; gap:10px; }
    
    nav a { color:var(--text-muted); text-decoration:none; margin-left:20px; font-weight:500; cursor:pointer; }
    nav a:hover, nav a.active { color:var(--primary); }

    .btn { padding:10px 20px; border:0; border-radius:6px; cursor:pointer; font-size:0.95rem; transition:all 0.2s; font-weight:500; display:inline-flex; align-items:center; gap:8px;}
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { background:var(--primary-dark); }
    .btn-secondary { background:var(--secondary); color:#fff; }
    .btn-danger { background:var(--danger); color:#fff; }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-main); }
    .btn-block { width:100%; }

    main { padding: 2rem 0; min-height: 80vh; }
    .section-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border-bottom:2px solid var(--border); padding-bottom:0.5rem; }
    .hidden { display:none !important; }

    /* Test Styles */
    #testInterface { max-width:800px; margin:0 auto; background:var(--card-bg); padding:40px; border-radius:16px; box-shadow:var(--shadow); text-align:center; }
    .test-progress { width:100%; background:#e2e8f0; height:8px; border-radius:4px; margin-bottom:30px; overflow:hidden; }
    .test-progress-bar { height:100%; background:var(--primary); width:0%; transition:width 0.3s ease; }
    .test-question-text { font-size:1.4rem; font-weight:600; margin:30px 0; min-height:100px; display:flex; align-items:center; justify-content:center; }
    .batch-selector { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:20px; }
    .batch-btn { padding:10px 15px; border:1px solid var(--border); background:#fff; border-radius:8px; cursor:pointer; }
    .batch-btn:hover, .batch-btn.active { border-color:var(--primary); background:#eff6ff; color:var(--primary); font-weight:600; }

    /* Admin & Grid */
    .question-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; }
    .question-card { background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:20px; }
    .badge { display:inline-block; padding:4px 10px; border-radius:20px; font-size:0.75rem; background:#e0f2fe; color:var(--primary); margin-bottom:10px; font-weight:600; }
    
    table { width:100%; border-collapse: collapse; background:var(--card-bg); border-radius:8px; overflow:hidden; }
    th, td { padding:12px 15px; text-align:left; border-bottom:1px solid var(--border); }
    th { background:#f1f5f9; }

    /* Modal */
    .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; z-index:1000; opacity:0; visibility:hidden; transition:all 0.3s; }
    .modal-overlay.open { opacity:1; visibility:visible; }
    .modal { background:var(--card-bg); padding:25px; border-radius:12px; width:100%; max-width:600px; max-height:90vh; overflow-y:auto;}
    .form-group { margin-bottom:15px; }
    .form-group label { display:block; margin-bottom:8px; font-weight:600; font-size:0.9rem; }
    .form-group input, .form-group textarea, .form-group select { width:100%; padding:10px; border:1px solid var(--border); border-radius:6px; }
    .file-upload-area { border:2px dashed var(--border); padding:20px; text-align:center; border-radius:8px; margin-bottom:15px; background:#f8fafc; }

    /* Toast */
    #toast-container { position:fixed; bottom:20px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:10px; }
    .toast { padding:12px 20px; border-radius:6px; color:#fff; box-shadow:0 4px 6px rgba(0,0,0,0.1); animation: slideIn 0.3s ease; min-width:250px; }
    .toast.success { background:var(--success); }
    .toast.error { background:var(--danger); }
  </style>
</head>
<body>

  <header>
    <div class="container header-content">
      <h1>🗄️ Test Tizimi (DB)</h1>
      <nav>
        <a id="navTest" onclick="switchView('test')" class="active">Test</a>
        <a id="navPublic" onclick="switchView('public')">Savollar</a>
        <a id="navAdmin" onclick="switchView('admin')">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">
    
    <!-- TEST VIEW -->
    <section id="testView">
      <div class="section-title"><h2>Test Rejimi</h2></div>
      <div id="testSetup">
        <div class="form-group">
          <label>Kategoriya:</label>
          <select id="testCategorySelect" style="width:100%; padding:10px;">
            <option value="all">Barchasi</option>
          </select>
        </div>
        <label>Qismni tanlang:</label>
        <div id="batchContainer" class="batch-selector"></div>
        <button class="btn btn-primary" onclick="startTest()">Testni Boshlash</button>
      </div>

      <div id="activeTest" class="hidden">
        <div class="test-progress"><div id="progressBar" class="test-progress-bar"></div></div>
        <div class="test-question-text" id="currentQuestionText"></div>
        <div class="test-controls" style="display:flex; justify-content:space-between; margin-top:30px;">
          <button class="btn btn-secondary" onclick="prevQuestion()">Orqaga</button>
          <button class="btn btn-primary" onclick="nextQuestion()">Keyingi</button>
        </div>
      </div>
    </section>

    <!-- PUBLIC VIEW -->
    <section id="publicView" class="hidden">
      <div class="section-title"><h2>Barcha Savollar</h2></div>
      <div class="question-grid" id="publicQuestionGrid"></div>
    </section>

    <!-- ADMIN VIEW -->
    <section id="adminView" class="hidden">
      <div class="section-title">
        <h2>Admin Panel</h2>
        <button class="btn btn-primary" onclick="openAddModal()">+ Savol Qo'shish</button>
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Mazmun</th>
              <th>Kategoriya</th>
              <th>Qism</th>
              <th>Amallar</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- MODAL ADD -->
  <div id="questionModal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3>Savol Qo'shish</h3>
        <button onclick="closeModal('questionModal')" style="border:none;background:none;cursor:pointer;font-size:1.5rem;">&times;</button>
      </div>
      
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button class="btn btn-sm btn-outline" onclick="toggleMode('single')" id="btnSingle">Bitta</button>
        <button class="btn btn-sm btn-outline" onclick="toggleMode('file')" id="btnFile">TXT Yuklash</button>
      </div>

      <!-- Single Form -->
      <form id="singleForm" onsubmit="handleSingleSubmit(event)">
        <div class="form-group">
          <label>Savol matni</label>
          <textarea id="qContentSingle" required></textarea>
        </div>
        <div class="form-group">
          <label>Kategoriya</label>
          <select id="qCategorySingle" required>
            <option value="Siyosat">Siyosat</option>
            <option value="Iqtisodiyot">Iqtisodiyot</option>
            <option value="Mantiq">Mantiq</option>
            <option value="Umumiy">Umumiy</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Saqlash</button>
      </form>

      <!-- File Form -->
      <form id="fileForm" class="hidden" onsubmit="handleFileSubmit(event)">
        <div class="form-group">
          <label>TXT Fayl</label>
          <div class="file-upload-area">
            <input type="file" id="txtFileInput" accept=".txt" required>
          </div>
        </div>
        <div class="form-group">
          <label>Kategoriya</label>
          <select id="qCategoryFile" required>
            <option value="Siyosat">Siyosat</option>
            <option value="Iqtisodiyot">Iqtisodiyot</option>
            <option value="Mantiq">Mantiq</option>
            <option value="Umumiy">Umumiy</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Yuklash</button>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script>
    // Backend manzili
    const API_URL = "http://localhost:3000/api"; 
    const BATCH_SIZE = 30;

    let state = {
      questions: [], // Serverdan kelgan ma'lumotlar
      currentTest: { questions: [], currentIndex: 0, activeBatch: 1 }
    };

    // --- INIT ---
    document.addEventListener('DOMContentLoaded', () => {
      fetchQuestions();
    });

    // --- API CALLS (Backend bilan ishlash) ---
    async function fetchQuestions() {
      try {
        const res = await fetch(`${API_URL}/questions`);
        if (!res.ok) throw new Error("Server xatosi");
        state.questions = await res.json();
        renderAll();
        updateTestCategoryOptions();
        setupBatches();
      } catch (err) {
        console.error(err);
        showToast("Ma'lumotlarni yuklab bo'lmadi. Server ishlayaptimi?", "error");
      }
    }

    async function addQuestionToDB(data) {
      try {
        const res = await fetch(`${API_URL}/questions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        if (res.ok) {
          showToast("Savol qo'shildi!", "success");
          fetchQuestions(); // Ro'yxatni yangilash
        } else {
          showToast("Xatolik yuz berdi", "error");
        }
      } catch (err) {
        showToast("Serverga ulanib bo'lmadi", "error");
      }
    }

    async function addBulkQuestionsToDB(questionsArray) {
      try {
        const res = await fetch(`${API_URL}/questions/bulk`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ questions: questionsArray })
        });
        if (res.ok) {
          const result = await res.json();
          showToast(result.message, "success");
          fetchQuestions();
        } else {
          showToast("Xatolik yuz berdi", "error");
        }
      } catch (err) {
        showToast("Serverga ulanib bo'lmadi", "error");
      }
    }

    async function deleteQuestionFromDB(id) {
      if (!confirm("O'chirasizmi?")) return;
      try {
        await fetch(`${API_URL}/questions/${id}`, { method: 'DELETE' });
        showToast("O'chirildi", "success");
        fetchQuestions();
      } catch (err) {
        showToast("Xatolik", "error");
      }
    }

    // --- UI FUNCTIONS ---
    function renderAll() {
      renderPublicGrid();
      renderAdminTable();
    }

    function renderPublicGrid() {
      const grid = document.getElementById('publicQuestionGrid');
      grid.innerHTML = '';
      state.questions.forEach(q => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.innerHTML = `<span class="badge">${q.category}</span><h3>Qism: ${q.batchId}</h3><p>${escapeHtml(q.content)}</p>`;
        grid.appendChild(card);
      });
    }

    function renderAdminTable() {
      const tbody = document.getElementById('adminTableBody');
      tbody.innerHTML = '';
      state.questions.forEach(q => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(q.content.substring(0, 50))}...</td>
          <td><span class="badge">${q.category}</span></td>
          <td>Qism ${q.batchId}</td>
          <td>
             <button class="btn btn-sm btn-danger" onclick="deleteQuestionFromDB('${q._id}')">O'chirish</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    // --- TEST LOGIC ---
    function updateTestCategoryOptions() {
      const select = document.getElementById('testCategorySelect');
      const cats = [...new Set(state.questions.map(q => q.category))];
      select.innerHTML = '<option value="all">Barchasi</option>' + 
                        cats.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function setupBatches() {
      const container = document.getElementById('batchContainer');
      container.innerHTML = '';
      const maxBatch = state.questions.length > 0 ? Math.max(...state.questions.map(q => q.batchId)) : 1;
      
      for(let i=1; i<=maxBatch; i++) {
        const btn = document.createElement('div');
        btn.className = 'batch-btn';
        btn.textContent = `Qism ${i}`;
        btn.onclick = () => { 
          document.querySelectorAll('.batch-btn').forEach(b => b.classList.remove('active')); 
          btn.classList.add('active'); 
          state.currentTest.activeBatch = i; 
        };
        if(i === 1) btn.classList.add('active');
        container.appendChild(btn);
      }
    }

    function startTest() {
      const cat = document.getElementById('testCategorySelect').value;
      let filtered = state.questions.filter(q => cat === 'all' || q.category === cat);
      filtered.sort((a,b) => a.createdAt - b.createdAt); // Ketma-ket

      // Partlarga ajratish
      const start = (state.currentTest.activeBatch - 1) * BATCH_SIZE;
      const end = start + BATCH_SIZE;
      state.currentTest.questions = filtered.slice(start, end);
      state.currentTest.currentIndex = 0;

      if (state.currentTest.questions.length === 0) return showToast("Bu qismda savol yo'q", "error");

      document.getElementById('testSetup').classList.add('hidden');
      document.getElementById('activeTest').classList.remove('hidden');
      renderTestQuestion();
    }

    function renderTestQuestion() {
      const test = state.currentTest;
      if (test.currentIndex >= test.questions.length) {
        document.getElementById('activeTest').classList.add('hidden');
        document.getElementById('testSetup').classList.remove('hidden');
        return showToast("Test tugadi!", "success");
      }
      const q = test.questions[test.currentIndex];
      document.getElementById('currentQuestionText').textContent = q.content;
      const progress = ((test.currentIndex + 1) / test.questions.length) * 100;
      document.getElementById('progressBar').style.width = `${progress}%`;
    }

    function nextQuestion() { state.currentTest.currentIndex++; renderTestQuestion(); }
    function prevQuestion() { if(state.currentTest.currentIndex > 0) { state.currentTest.currentIndex--; renderTestQuestion(); } }

    // --- UPLOAD LOGIC ---
    function toggleMode(mode) {
      if(mode === 'single') {
        document.getElementById('singleForm').classList.remove('hidden');
        document.getElementById('fileForm').classList.add('hidden');
      } else {
        document.getElementById('singleForm').classList.add('hidden');
        document.getElementById('fileForm').classList.remove('hidden');
      }
    }

    function handleSingleSubmit(e) {
      e.preventDefault();
      const data = {
        content: document.getElementById('qContentSingle').value,
        category: document.getElementById('qCategorySingle').value
      };
      addQuestionToDB(data);
      closeModal('questionModal');
      document.getElementById('qContentSingle').value = '';
    }

    function handleFileSubmit(e) {
      e.preventDefault();
      const file = document.getElementById('txtFileInput').files[0];
      const category = document.getElementById('qCategoryFile').value;
      
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const lines = ev.target.result.split(/\r?\n/).map(l => l.trim()).filter(l => l);
        const questions = lines.map(content => ({ content, category }));
        addBulkQuestionsToDB(questions);
        closeModal('questionModal');
        document.getElementById('txtFileInput').value = '';
      };
      reader.readAsText(file);
    }

    // --- UTILS ---
    function switchView(v) {
      ['testView', 'publicView', 'adminView'].forEach(id => document.getElementById(id).classList.add('hidden'));
      document.getElementById(v + 'View').classList.remove('hidden');
      document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
      document.getElementById('nav' + v.charAt(0).toUpperCase() + v.slice(1)).classList.add('active');
    }
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    function showToast(msg, type) {
      const t = document.createElement('div');
      t.className = `toast ${type}`; t.textContent = msg;
      document.getElementById('toast-container').appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }
    function escapeHtml(t) { return t ? t.replace(/</g,"&lt;").replace(/>/g,"&gt;") : ""; }
  </script>
</body>
</html>
